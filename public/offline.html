<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline — REGI</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0fdfa;
        --fg: #0f172a;
        --muted: #475569;
        --brand: #115e59;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: linear-gradient(180deg, #f0fdfa 0%, #f8fafc 40%, #f8fafc 100%);
        color: var(--fg);
      }
      main {
        width: min(28rem, 100%);
        text-align: center;
      }
      p.brand {
        margin: 0 0 0.5rem;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand);
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1.25;
      }
      p.copy {
        margin: 0.75rem 0 0;
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        margin-top: 1.25rem;
        min-height: 2.75rem;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.1rem;
        border-radius: 0.75rem;
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">REGI</p>
      <h1>You’re offline</h1>
      <p class="copy">
        REGI can’t reach the network right now. Check your connection and try
        again — your garage will be waiting.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
